name: ci

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "**/*.html"
      - "**/*.css"
      - "**/*.js"
      - "**/*.conf"

  workflow_dispatch:

jobs:
  docker:
    name: Docker Image Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.3.0
          terraform_wrapper: false

      - name: Check Infrastructure Outputs
        run: |
          terraform init

          ECR_REPOSITORY_URL=$(terraform output -raw ecr_repository_url 2>/dev/null || true)

          if [ -z "$ECR_REPOSITORY_URL" ]; then
            echo "Error: Infrastructure is not ready."
            echo "Please run infrastructure.yml with action=apply first."
            exit 1
          fi

          echo "ECR_REPOSITORY_URL=$ECR_REPOSITORY_URL" >> "$GITHUB_ENV"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$ECR_REPOSITORY_URL:$IMAGE_TAG" \
            -t "$ECR_REPOSITORY_URL:latest" \
            .

          docker push "$ECR_REPOSITORY_URL:$IMAGE_TAG"
          docker push "$ECR_REPOSITORY_URL:latest"